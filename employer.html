<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Employer Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #eceff1; padding: 16px 12px; min-height: 100vh; }
    h1 { font-size: 1.5rem; color: #222; margin-bottom: 14px; text-align: center; }
    .card { background: white; border-radius: 12px; padding: 16px; max-width: 960px; margin: 0 auto 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card h2 { margin-bottom: 10px; color: #333; font-size: 1rem; }
    input { padding: 10px 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; -webkit-appearance: none; min-height: 44px; }
    .btn { padding: 12px 18px; font-size: 0.92rem; font-weight: bold; border: none; border-radius: 9px; cursor: pointer; display: inline-block; -webkit-appearance: none; min-height: 44px; }
    .btn-primary { background: #1565c0; color: white; }
    .btn-success { background: #2e7d32; color: white; }
    .btn-danger  { background: #e53935; color: white; font-size: 0.78rem; padding: 7px 12px; }
    .btn-orange  { background: #e65100; color: white; }
    .btn-full    { width: 100%; display: block; text-align: center; margin-top: 6px; }
    .hidden { display: none !important; }
    .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .tab-btn { padding: 9px 14px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.85rem; font-weight: bold; background: #dce3ea; color: #555; -webkit-appearance: none; min-height: 44px; }
    .tab-btn.active { background: white; color: #1565c0; border-bottom: 3px solid #1565c0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { background: #f5f5f5; padding: 7px 6px; text-align: left; color: #555; border-bottom: 2px solid #eee; }
    td { padding: 7px 6px; border-bottom: 1px solid #f0f0f0; color: #333; vertical-align: top; }
    .total-row { background: #e8f5e9; font-weight: bold; }
    .grand-row td { background: #1565c0; color: white; font-weight: bold; }
    .badge { background: #e3f2fd; color: #1565c0; font-weight: bold; padding: 2px 7px; border-radius: 20px; font-size: 0.75rem; font-family: monospace; }
    .emp-block { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .emp-name { font-size: 0.95rem; font-weight: bold; color: #1565c0; }
    .emp-meta { font-size: 0.75rem; color: #888; margin: 4px 0 8px; }
    .late-note { font-size: 0.72rem; color: #e65100; font-style: italic; }
    .pay-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .pay-box { flex: 1; min-width: 100px; background: #f3f8ff; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #d0e4ff; }
    .pay-box.green { background: #e8f5e9; border-color: #a5d6a7; }
    .pay-label { font-size: 0.72rem; color: #777; margin-bottom: 4px; }
    .pay-value { font-size: 1.2rem; font-weight: bold; color: #1565c0; }
    .pay-box.green .pay-value { color: #2e7d32; }
    .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .week-nav button { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.85rem; -webkit-appearance: none; min-height: 44px; }
    .week-label { font-weight: bold; color: #333; font-size: 0.85rem; flex: 1; text-align: center; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .filter-row input { margin: 0; flex: 1; min-width: 120px; }
    .uname-result { margin-top: 10px; padding: 12px; background: #f0f7ff; border-radius: 10px; border: 1px solid #cde; }
    .rate-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .rate-input { width: 80px !important; margin: 0; padding: 8px 6px !important; font-size: 0.85rem !important; }
    #err, #add-err { color: #c00; font-size: 0.85rem; margin-top: 6px; }
    #copy-msg { font-size: 0.78rem; color: #2e7d32; margin-left: 6px; }
    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
<h1>Employer Dashboard</h1>

<div class="card" id="login-card">
  <h2>Employer Login</h2>
  <input type="password" id="emp-pass" placeholder="Enter employer password"/>
  <button class="btn btn-primary btn-full" onclick="employerLogin()">Login</button>
  <div id="err"></div>
</div>

<div class="hidden" id="dashboard">
  <div class="card" style="padding-bottom:0;">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('employees')">Employees</button>
      <button class="tab-btn" onclick="switchTab('payroll')">Payroll</button>
      <button class="tab-btn" onclick="switchTab('timelogs')">Time Logs</button>
    </div>
  </div>

  <div class="card tab-content active" id="tab-employees">
    <h2>Add New Employee</h2>
    <input type="text" id="new-name" placeholder="Full Name"/>
    <input type="tel" id="new-phone" placeholder="Phone Number"/>
    <div class="rate-row" style="margin-bottom:10px;">
      <span>$</span>
      <input type="number" id="new-rate" placeholder="Rate" min="0" step="0.01" class="rate-input"/>
      <span>/hr</span>
    </div>
    <button class="btn btn-success btn-full" onclick="addEmployee()">Generate Username &amp; Add</button>
    <div id="add-err"></div>
    <div class="uname-result hidden" id="new-username-result">
      <p style="font-size:0.85rem;color:#555;margin-bottom:8px;">Share this username with employee:</p>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span id="generated-uname" class="badge" style="font-size:0.95rem;padding:5px 14px;"></span>
        <button class="btn btn-primary" style="font-size:0.78rem;padding:7px 12px;" onclick="copyUsername()">Copy</button>
        <span id="copy-msg" class="hidden">Copied!</span>
      </div>
    </div>
    <hr style="margin:14px 0;border:none;border-top:1px solid #eee;"/>
    <h2>Employee Roster</h2>
    <div id="roster"><p style="color:#aaa;">Loading...</p></div>
  </div>

  <div class="card tab-content" id="tab-payroll">
    <h2>Weekly Payroll</h2>
    <div class="week-nav">
      <button onclick="shiftWeek(-1)">&#9664; Prev</button>
      <span class="week-label" id="week-label">Loading...</span>
      <button onclick="shiftWeek(1)">Next &#9654;</button>
    </div>
    <div class="pay-row" id="pay-summary"></div>
    <div id="payroll-table"><p style="color:#aaa;">Loading...</p></div>
    <div style="margin-top:12px;text-align:right;">
      <button class="btn btn-orange" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="card tab-content" id="tab-timelogs">
    <h2>Time Logs</h2>
    <div class="filter-row">
      <input type="text" id="filter-name" placeholder="Name or username..."/>
      <input type="date" id="filter-from"/>
      <input type="date" id="filter-to"/>
      <button class="btn btn-primary" onclick="loadLogs()">Search</button>
    </div>
    <div id="all-records"><p style="color:#aaa;">Click Search to load records.</p></div>
  </div>
</div>

<!-- Firebase Compat SDK - works on ALL browsers including old iOS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  var EMPLOYER_PASSWORD = "admin1234";
  var weekOffset = 0;
  var db;
  var payrollData = null;
  var payrollWeekLabel = "";

  firebase.initializeApp({
    apiKey: "AIzaSyAhZ3DfR8VWBAOPfqZ3wxynI587VOCq4T8",
    authDomain: "clock-in-clock-out-74188.firebaseapp.com",
    projectId: "clock-in-clock-out-74188",
    storageBucket: "clock-in-clock-out-74188.firebasestorage.app",
    messagingSenderId: "29359035149",
    appId: "1:29359035149:web:c344dad550ed55173a9644"
  });
  db = firebase.firestore();

  function switchTab(name) {
    var names = ["employees","payroll","timelogs"];
    var btns = document.querySelectorAll(".tab-btn");
    for (var i = 0; i < btns.length; i++) {
      if (names[i] === name) btns[i].classList.add("active");
      else btns[i].classList.remove("active");
    }
    var tabs = document.querySelectorAll(".tab-content");
    for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove("active");
    document.getElementById("tab-" + name).classList.add("active");
    if (name === "payroll") loadPayroll();
  }

  function employerLogin() {
    var pass = document.getElementById("emp-pass").value;
    if (pass !== EMPLOYER_PASSWORD) {
      document.getElementById("err").textContent = "Incorrect password.";
      return;
    }
    document.getElementById("login-card").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    updateWeekLabel();
    loadRoster();
    loadPayroll();
  }

  function genUsername(name) {
    var parts = name.trim().toLowerCase().replace(/[^a-z ]/g,"").split(/ +/);
    if (parts.length < 2) return parts[0] + Math.floor(100 + Math.random()*900);
    return parts[0] + "." + parts[parts.length-1];
  }

  function ensureUnique(base, cb) {
    db.collection("employees").where("username","==",base).get().then(function(snap) {
      if (snap.empty) { cb(base); return; }
      ensureUnique(base + "1", cb);
    });
  }

  function addEmployee() {
    var name  = document.getElementById("new-name").value.trim();
    var phone = document.getElementById("new-phone").value.trim();
    var rate  = parseFloat(document.getElementById("new-rate").value);
    var errEl = document.getElementById("add-err");
    errEl.textContent = "";
    if (!name)           { errEl.textContent = "Enter a name."; return; }
    if (!phone)          { errEl.textContent = "Enter a phone number."; return; }
    if (isNaN(rate)||rate<0) { errEl.textContent = "Enter a valid hourly rate."; return; }
    ensureUnique(genUsername(name), function(username) {
      db.collection("employees").add({
        name: name, phone: phone, username: username,
        hourlyRate: rate, active: true,
        createdAt: firebase.firestore.Timestamp.now()
      }).then(function() {
        document.getElementById("generated-uname").textContent = username;
        document.getElementById("new-username-result").classList.remove("hidden");
        document.getElementById("new-name").value  = "";
        document.getElementById("new-phone").value = "";
        document.getElementById("new-rate").value  = "";
        loadRoster();
      });
    });
  }

  function copyUsername() {
    var txt = document.getElementById("generated-uname").textContent;
    var msg = document.getElementById("copy-msg");
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(function() {
        msg.classList.remove("hidden");
        setTimeout(function() { msg.classList.add("hidden"); }, 2000);
      });
    } else {
      var ta = document.createElement("textarea");
      ta.value = txt; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      msg.classList.remove("hidden");
      setTimeout(function() { msg.classList.add("hidden"); }, 2000);
    }
  }

  function updateRate(empId, val) {
    var rate = parseFloat(val);
    if (!isNaN(rate) && rate >= 0) db.collection("employees").doc(empId).update({ hourlyRate: rate });
  }

  function removeEmployee(id) {
    if (!confirm("Remove this employee?")) return;
    db.collection("employees").doc(id).delete().then(loadRoster);
  }

  function loadRoster() {
    db.collection("employees").get().then(function(snap) {
      var el = document.getElementById("roster");
      if (snap.empty) { el.innerHTML = "<p style='color:#aaa;font-style:italic;'>No employees yet.</p>"; return; }
      var rows = "";
      snap.forEach(function(d) {
        var e = d.data();
        var rv = (e.hourlyRate !== undefined) ? e.hourlyRate : "";
        var eid = d.id;
        var rateHtml = "<div class='rate-row'><span>$</span><input class='rate-input' type='number' min='0' step='0.01' value='" + rv.toString().replace(/'/g, "&#39;") + "' data-emp-id='" + eid.replace(/'/g, "&#39;") + "' onchange='updateRate(this.getAttribute(\"data-emp-id\"),this.value)'/><span>/hr</span></div>";
        var btnHtml = "<button class='btn btn-danger' data-emp-id='" + eid.replace(/'/g, "&#39;") + "' onclick='removeEmployee(this.getAttribute(\"data-emp-id\"))'>Remove</button>";
        rows += "<tr>" +
          "<td>" + (e.name || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</td>" +
          "<td><span class='badge'>" + (e.username || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</span></td>" +
          "<td>" + (e.phone || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</td>" +
          "<td>" + rateHtml + "</td>" +
          "<td>" + btnHtml + "</td>" +
          "</tr>";
      });
      el.innerHTML = "<div class='table-wrapper'><table><thead><tr><th>Name</th><th>Username</th><th>Phone</th><th>Rate</th><th></th></tr></thead><tbody>" + rows + "</tbody></table></div>";
    });
  }

  function getWeekRange(offset) {
    var now = new Date();
    var dow = now.getDay();
    var mon = new Date(now);
    mon.setDate(now.getDate() - ((dow + 6) % 7) + offset * 7);
    mon.setHours(0,0,0,0);
    var sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    sun.setHours(23,59,59,999);
    return { mon: mon, sun: sun };
  }

  function fmtDate(d) {
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return mo[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
  }

  function fmtH(mins) { return Math.floor(mins/60) + "h " + (mins%60) + "m"; }

  function updateWeekLabel() {
    var r = getWeekRange(weekOffset);
    payrollWeekLabel = "Week of " + fmtDate(r.mon) + " - " + fmtDate(r.sun);
    document.getElementById("week-label").textContent = payrollWeekLabel;
  }

  function shiftWeek(dir) { weekOffset += dir; updateWeekLabel(); loadPayroll(); }

  function loadPayroll() {
    updateWeekLabel();
    var range = getWeekRange(weekOffset);
    db.collection("employees").get().then(function(empSnap) {
      var emps = {};
      empSnap.forEach(function(d) { emps[d.data().username] = Object.assign({ id: d.id }, d.data()); });
      db.collection("timeLogs")
        .where("clockIn",">=",firebase.firestore.Timestamp.fromDate(range.mon))
        .where("clockIn","<=",firebase.firestore.Timestamp.fromDate(range.sun))
        .orderBy("clockIn","asc")
        .get().then(function(logSnap) {
          var tally = {};
          logSnap.forEach(function(d) {
            var r = d.data();
            if (!r.username) return;
            if (!tally[r.username]) tally[r.username] = { mins: 0 };
            tally[r.username].mins += (r.durationMins || 0);
          });
          var allU = {};
          var k;
          for (k in emps)  allU[k] = true;
          for (k in tally) allU[k] = true;
          var totalPay = 0, totalMins = 0, rows = "";
          var csvRows = [["Employee","Username","Phone","Rate","Hours","Regular Pay","OT Pay","Gross Pay"]];
          for (var u in allU) {
            var emp = emps[u]; if (!emp) continue;
            var mins = tally[u] ? tally[u].mins : 0;
            var hrs  = mins / 60;
            var rate = emp.hourlyRate || 0;
            var reg  = Math.min(hrs, 40);
            var ot   = Math.max(0, hrs - 40);
            var rPay = reg * rate;
            var oPay = ot * rate * 1.5;
            var gPay = rPay + oPay;
            totalPay  += gPay;
            totalMins += mins;
            var otTxt = ot > 0 ? " (+" + ot.toFixed(1) + "h OT)" : "";
            rows += "<tr>" +
              "<td>" + (emp.name || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</td>" +
              "<td><span class='badge'>" + (u || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</span></td>" +
              "<td>$" + rate.toFixed(2) + "/hr</td>" +
              "<td>" + fmtH(mins) + otTxt + "</td>" +
              "<td>$" + rPay.toFixed(2) + "</td>" +
              "<td>" + (oPay > 0 ? "$" + oPay.toFixed(2) : "--") + "</td>" +
              "<td style='font-weight:bold;color:#2e7d32;'>$" + gPay.toFixed(2) + "</td></tr>";
            csvRows.push([emp.name, u, emp.phone, "$"+rate.toFixed(2), hrs.toFixed(2), "$"+rPay.toFixed(2), "$"+oPay.toFixed(2), "$"+gPay.toFixed(2)]);
          }
          var n = Object.keys(allU).length;
          document.getElementById("pay-summary").innerHTML =
            "<div class='pay-box'><div class='pay-label'>Employees</div><div class='pay-value'>" + n + "</div></div>" +
            "<div class='pay-box'><div class='pay-label'>Total Hours</div><div class='pay-value'>" + fmtH(totalMins) + "</div></div>" +
            "<div class='pay-box green'><div class='pay-label'>Gross Payroll</div><div class='pay-value'>$" + totalPay.toFixed(2) + "</div></div>";
          document.getElementById("payroll-table").innerHTML = rows
            ? "<div class='table-wrapper'><table><thead><tr><th>Employee</th><th>Username</th><th>Rate</th><th>Hours</th><th>Reg Pay</th><th>OT Pay</th><th>Gross</th></tr></thead><tbody>" + rows + "</tbody></table></div>"
            : "<p style='color:#aaa;font-style:italic;padding:10px'>No records this week.</p>";
          payrollData = csvRows;
        });
    });
  }

  function exportCSV() {
    if (!payrollData) return;
    var csv = "Payroll - " + payrollWeekLabel + "\n\n" +
      payrollData.map(function(r) { return r.map(function(v) { return '"' + v.toString().replace(/"/g, '""') + '"'; }).join(","); }).join("\n");
    var blob = new Blob([csv], { type: "text/csv" });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href   = url; a.download = "payroll.csv";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function loadLogs() {
    var nf   = document.getElementById("filter-name").value.trim().toLowerCase();
    var fv   = document.getElementById("filter-from").value;
    var tv   = document.getElementById("filter-to").value;
    var from = fv ? new Date(fv) : (function() { var d=new Date(); d.setDate(d.getDate()-6); d.setHours(0,0,0,0); return d; })();
    var to   = tv ? new Date(tv + "T23:59:59") : new Date();
    db.collection("timeLogs")
      .where("clockIn",">=",firebase.firestore.Timestamp.fromDate(from))
      .where("clockIn","<=",firebase.firestore.Timestamp.fromDate(to))
      .orderBy("clockIn","desc")
      .get().then(function(snap) {
        var el = document.getElementById("all-records");
        if (snap.empty) { el.innerHTML = "<p style='color:#aaa;'>No records found.</p>"; return; }
        var grp = {};
        snap.forEach(function(d) {
          var r = d.data();
          var nm = r.name ? r.name.toLowerCase() : "";
          var un = r.username ? r.username.toLowerCase() : "";
          if (nf && nm.indexOf(nf) === -1 && un.indexOf(nf) === -1) return;
          var key = r.username || r.phone;
          if (!grp[key]) grp[key] = { name: r.name, username: r.username || "-", phone: r.phone, recs: [] };
          grp[key].recs.push(r);
        });
        if (!Object.keys(grp).length) { el.innerHTML = "<p style='color:#aaa;'>No matching records.</p>"; return; }
        var html = "";
        for (var k in grp) {
          var g = grp[k]; var tm = 0; var rows = "";
          for (var i = 0; i < g.recs.length; i++) {
            var r2  = g.recs[i];
            var inT = r2.clockIn  ? r2.clockIn.toDate().toLocaleString()  : "-";
            var ouT = r2.clockOut ? r2.clockOut.toDate().toLocaleString() : "Active";
            var dur = (r2.durationMins != null) ? fmtH(r2.durationMins) : "-";
            var nt  = r2.explanation ? "<div class='late-note'>Note: " + r2.explanation.replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</div>" : "";
            tm += r2.durationMins || 0;
            rows += "<tr><td>" + inT + nt + "</td><td>" + ouT + "</td><td>" + dur + "</td><td style='font-size:0.7rem;color:#888'>" + ((r2.locationIn || "-").replace(/</g, "&lt;").replace(/>/g, "&gt;")) + "</td></tr>";
          }
          html += "<div class='emp-block'><div class='emp-name'>" + (g.name || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</div><div class='emp-meta'><span class='badge'>" + (g.username || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</span> | " + (g.phone || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</div><div class='table-wrapper'><table style='font-size:0.75rem;'><thead><tr><th>Clock In</th><th>Clock Out</th><th>Duration</th><th>Location</th></tr></thead><tbody>" + rows + "</tbody></table></div></div>";
        }
        el.innerHTML = html;
      });
  }
</script>
</body>
</html>
